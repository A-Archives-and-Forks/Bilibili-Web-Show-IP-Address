name: CI

on:
  push:
    branches:
      - main
    paths:
      - '**.ts'
      - '.github/workflows/**'
      - '.vscode/**'
  pull_request:
    branches:
      - main
    paths:
      - '**.ts'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Check
        run: vp check

      - name: Build
        run: vp run build
